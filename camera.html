<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GF9 to Leica 스타일 변환기</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #66757d 0%, #2e3a42 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 32px;
            max-width: 1200px;
            width: 100%;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: #1e2a32;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #4a5b66;
            margin-bottom: 30px;
            font-style: italic;
            border-left: 4px solid #b38b5d;
            padding-left: 16px;
        }
        .upload-area {
            border: 2px dashed #9aaeb9;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            background: #f0f5f9;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .upload-area:hover {
            border-color: #b38b5d;
            background: #e8edf2;
        }
        .upload-area.dragover {
            border-color: #b38b5d;
            background: #e0e8f0;
        }
        .upload-icon {
            font-size: 48px;
            color: #7a8b9b;
            margin-bottom: 12px;
        }
        .upload-btn {
            background: #b38b5d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
            margin-top: 10px;
        }
        .upload-btn:hover {
            background: #9e764b;
        }
        .preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 20px;
        }
        .image-card {
            flex: 1 1 300px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .image-card:hover {
            transform: translateY(-5px);
        }
        .image-header {
            padding: 15px 20px;
            background: #f5f5f5;
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .badge {
            background: #b38b5d;
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 400;
        }
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #1e2a32;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .control-panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
            margin-top: 30px;
            border: 1px solid #dde3e8;
        }
        .control-item {
            margin-bottom: 24px;
        }
        .control-item label {
            display: flex;
            justify-content: space-between;
            color: #1e2a32;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .control-item input[type=range] {
            width: 100%;
            height: 6px;
            background: #dde3e8;
            border-radius: 10px;
            appearance: none;
        }
        .control-item input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: #b38b5d;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .download-btn {
            background: #1e2a32;
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .download-btn:hover {
            background: #0f171f;
        }
        .value-display {
            font-family: monospace;
            background: #eef2f5;
            padding: 2px 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 GF9 → Leica Look</h1>
        <div class="subtitle">
            파나소닉 GF9 이미지를 라이카 스타일의 따뜻하고 깊이 있는 색감으로 변환합니다.
        </div>

        <!-- 업로드 영역 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🔼</div>
            <h3>이미지를 드래그하거나 클릭하여 업로드</h3>
            <p style="color:#7a8b9b; margin-bottom:20px;">JPG, PNG, WEBP 지원 (최대 20MB)</p>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
            <button class="upload-btn" id="selectFileBtn">이미지 선택</button>
        </div>

        <!-- 원본/결과 미리보기 영역 (처음엔 숨김) -->
        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="image-card">
                <div class="image-header">
                    <span>📷 GF9 원본</span>
                    <span class="badge">Original</span>
                </div>
                <div class="image-container" id="originalContainer">
                    <!-- 원본 이미지가 여기에 표시됨 -->
                </div>
            </div>
            <div class="image-card">
                <div class="image-header">
                    <span>✨ 라이카 스타일</span>
                    <span class="badge">Leica Look</span>
                </div>
                <div class="image-container" id="outputContainer">
                    <!-- 변환된 이미지가 여기에 표시됨 -->
                </div>
            </div>
        </div>

        <!-- 컨트롤 패널 (처음엔 숨김) -->
        <div class="control-panel" id="controlPanel" style="display: none;">
            <div class="control-item">
                <label>따뜻한 톤 (Warmth) <span id="warmthVal" class="value-display">+15</span></label>
                <input type="range" id="warmth" min="-30" max="30" value="15" step="1">
            </div>
            <div class="control-item">
                <label>녹색/마젠타 (Green-Magenta) <span id="greenVal" class="value-display">-8</span></label>
                <input type="range" id="greenShift" min="-30" max="30" value="-8" step="1">
            </div>
            <div class="control-item">
                <label>대비 (Contrast) <span id="contrastVal" class="value-display">+12</span></label>
                <input type="range" id="contrast" min="-30" max="30" value="12" step="1">
            </div>
            <div class="control-item">
                <label>채도 (Saturation) <span id="saturationVal" class="value-display">-5</span></label>
                <input type="range" id="saturation" min="-30" max="30" value="-5" step="1">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="download-btn" id="downloadBtn">📥 라이카 스타일 이미지 저장</button>
            </div>
            <p style="color:#7e8c9b; font-size:0.8rem; text-align:center; margin-top:16px;">
                ※ 이 필터는 라이카 스타일을 모방한 것으로, 실제 라이카 색감과는 차이가 있을 수 있습니다.
            </p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const previewArea = document.getElementById('previewArea');
        const controlPanel = document.getElementById('controlPanel');
        const originalContainer = document.getElementById('originalContainer');
        const outputContainer = document.getElementById('outputContainer');

        // 슬라이더 요소
        const warmthSlider = document.getElementById('warmth');
        const greenSlider = document.getElementById('greenShift');
        const contrastSlider = document.getElementById('contrast');
        const saturationSlider = document.getElementById('saturation');

        // 값 표시 spans
        const warmthVal = document.getElementById('warmthVal');
        const greenVal = document.getElementById('greenVal');
        const contrastVal = document.getElementById('contrastVal');
        const saturationVal = document.getElementById('saturationVal');

        const downloadBtn = document.getElementById('downloadBtn');

        // 현재 이미지 데이터 저장 (원본 이미지 객체, 변환에 사용할 Canvas)
        let originalImage = null;
        let originalFileName = 'gf9_leica_converted.jpg';

        // --- 슬라이더 값 실시간 업데이트 ---
        function updateSliderDisplays() {
            warmthVal.textContent = (warmthSlider.value > 0 ? '+' : '') + warmthSlider.value;
            greenVal.textContent = (greenSlider.value > 0 ? '+' : '') + greenSlider.value;
            contrastVal.textContent = (contrastSlider.value > 0 ? '+' : '') + contrastSlider.value;
            saturationVal.textContent = (saturationSlider.value > 0 ? '+' : '') + saturationSlider.value;
        }

        warmthSlider.addEventListener('input', () => {
            updateSliderDisplays();
            if (originalImage) applyLeicaFilter();
        });
        greenSlider.addEventListener('input', () => {
            updateSliderDisplays();
            if (originalImage) applyLeicaFilter();
        });
        contrastSlider.addEventListener('input', () => {
            updateSliderDisplays();
            if (originalImage) applyLeicaFilter();
        });
        saturationSlider.addEventListener('input', () => {
            updateSliderDisplays();
            if (originalImage) applyLeicaFilter();
        });

        // --- 업로드 영역 클릭 / 드래그 앤 드롭 ---
        selectFileBtn.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('click', () => fileInput.click());

        // 드래그 앤 드롭 처리
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleImageUpload(files[0]);
            } else {
                alert('이미지 파일만 업로드 가능합니다.');
            }
        });

        // 파일 선택 처리
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImageUpload(e.target.files[0]);
            }
        });

        // 이미지 업로드 핸들러
        function handleImageUpload(file) {
            if (file.size > 20 * 1024 * 1024) {
                alert('파일 크기는 20MB 이하여야 합니다.');
                return;
            }

            originalFileName = file.name.replace(/\.[^/.]+$/, '') + '_leica.jpg';

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    // 원본 표시
                    showOriginalImage(img);
                    // 변환 실행
                    applyLeicaFilter();
                    // UI 보이게
                    previewArea.style.display = 'flex';
                    controlPanel.style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 원본 이미지 표시
        function showOriginalImage(img) {
            originalContainer.innerHTML = ''; // 기존 내용 제거
            const clonedImg = img.cloneNode(true);
            clonedImg.style.maxWidth = '100%';
            clonedImg.style.maxHeight = '100%';
            originalContainer.appendChild(clonedImg);
        }

        // --- 핵심: 라이카 스타일 필터 적용 (픽셀 단위 변환) ---
        function applyLeicaFilter() {
            if (!originalImage) return;

            // 설정값 읽기
            const warmth = parseInt(warmthSlider.value);      // -30 ~ 30
            const greenShift = parseInt(greenSlider.value);   // -30 ~ 30
            const contrast = parseInt(contrastSlider.value);  // -30 ~ 30
            const saturation = parseInt(saturationSlider.value); // -30 ~ 30

            // Canvas 준비
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

            // 이미지 데이터 가져오기
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data; // RGBA 배열

            // 1. 대비 변환을 위한 룩업 테이블 미리 계산 (성능 향상)
            const contrastFactor = (contrast + 100) / 100; // -30~30 을 0.7~1.3 정도로 매핑
            const contrastLUT = new Array(256);
            for (let i = 0; i < 256; i++) {
                // 대비 공식: (i - 128) * contrastFactor + 128
                let val = (i - 128) * contrastFactor + 128;
                contrastLUT[i] = Math.min(255, Math.max(0, Math.round(val)));
            }

            // 채도 보정을 위한 가중치 (일반적인 공식: 0.2126R + 0.7152G + 0.0722B)
            // 채도 증가: 픽셀 = 원본 * sat + 그레이스케일 * (1-sat) , sat는 0~2 범위로 매핑
            const satFactor = 1.0 + (saturation / 50); // -30→0.4, 0→1.0, 30→1.6

            // 픽셀 단위 변환
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // 1차: 대비 적용 (LUT 사용)
                r = contrastLUT[r];
                g = contrastLUT[g];
                b = contrastLUT[b];

                // 그레이스케일 계산 (채도 조정용)
                const gray = Math.round(0.2126 * r + 0.7152 * g + 0.0722 * b);

                // 2차: 채도 조정 (공식: 채도 적용)
                if (satFactor !== 1.0) {
                    r = Math.round(gray + satFactor * (r - gray));
                    g = Math.round(gray + satFactor * (g - gray));
                    b = Math.round(gray + satFactor * (b - gray));
                }

                // 3차: 색상 보정 (라이카 스타일)
                // - 따뜻함(Warmth): R 강조, B 약화 (음수면 반대)
                r = Math.min(255, Math.max(0, r + warmth * 1.2));
                b = Math.min(255, Math.max(0, b - warmth * 1.2));
                // 녹색/마젠타 조정: G 채널 이동
                g = Math.min(255, Math.max(0, g - greenShift * 1.0)); // greenShift 양수면 G 감소(마젠타 증가), 음수면 G 증가

                // 4차: 그림자/하이라이트 부드럽게 (라이카 느낌의 약간의 S-커브)
                // 간단한 톤 커브 효과: 미들톤 약간 부스트 (soft contrast)
                // 예: 어두운 부분 살짝 올리고, 밝은 부분 살짝 내림 (페이드 효과)
                // 여기서는 미들톤 대비를 살짝 조정
                if (r > 0 && r < 255) {
                    r = Math.round(Math.pow(r / 255, 0.95) * 255); // 약간의 감마 보정 (부드럽게)
                }
                if (g > 0 && g < 255) {
                    g = Math.round(Math.pow(g / 255, 0.95) * 255);
                }
                if (b > 0 && b < 255) {
                    b = Math.round(Math.pow(b / 255, 0.95) * 255);
                }

                // 값 클리핑
                data[i] = Math.min(255, Math.max(0, r));
                data[i + 1] = Math.min(255, Math.max(0, g));
                data[i + 2] = Math.min(255, Math.max(0, b));
                // alpha는 그대로 (data[i+3])
            }

            // 변환된 데이터를 canvas에 다시 넣기
            ctx.putImageData(imageData, 0, 0);

            // 결과 이미지를 outputContainer에 표시
            outputContainer.innerHTML = '';
            const resultImg = document.createElement('img');
            resultImg.src = canvas.toDataURL('image/jpeg', 0.92);
            resultImg.style.maxWidth = '100%';
            resultImg.style.maxHeight = '100%';
            outputContainer.appendChild(resultImg);

            // 다운로드용 데이터 저장
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = originalFileName;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            };
        }

        // 초기 슬라이더 표시 업데이트
        updateSliderDisplays();
    </script>
</body>
</html>
